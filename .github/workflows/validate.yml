name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install --quiet Pillow

      - name: Determine changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git diff --name-only --diff-filter=AM "$BASE" "$HEAD" > changed.txt
          else
            git diff --name-only --diff-filter=AM HEAD~1 HEAD > changed.txt || git ls-files > changed.txt
          fi
          echo "changed files:"
          cat changed.txt

      - name: Validate assets
        run: python3 scripts/validate.py changed.txt
